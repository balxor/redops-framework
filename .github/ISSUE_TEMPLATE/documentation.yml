name: "Documentation"
description: "Report a documentation issue or suggest a documentation improvement."
title: "[Docs]: "
labels:
  - "documentation"

body:
  - type: input
    id: document-path
    attributes:
      label: "Document path"
      description: "Which document should be reviewed?"
      placeholder: "docs/safety-model.md"
    validations:
      required: true

  - type: dropdown
    id: documentation-type
    attributes:
      label: "Documentation type"
      description: "Select the closest issue type."
      options:
        - "Missing information"
        - "Unclear wording"
        - "Incorrect information"
        - "Inconsistent terminology"
        - "Broken link"
        - "Formatting issue"
        - "Example improvement"
        - "Template improvement"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: documentation-summary
    attributes:
      label: "Documentation summary"
      description: "Describe the issue or improvement."
      placeholder: "Explain what should be changed and why."
    validations:
      required: true

  - type: textarea
    id: suggested-update
    attributes:
      label: "Suggested update"
      description: "Provide suggested replacement text if available."
      placeholder: "Paste the suggested wording here."
    validations:
      required: false

  - type: textarea
    id: related-files
    attributes:
      label: "Related files"
      description: "List related files that may need updates."
      placeholder: "docs/glossary.md"
    validations:
      required: false

  - type: textarea
    id: public-safety-confirmation
    attributes:
      label: "Public safety confirmation"
      description: "Confirm that this issue uses public or placeholder information only."
      placeholder: "Confirmed. This issue does not include credentials, secrets, private logs, client data, or unsafe operational detail."
    validations:
      required: true
