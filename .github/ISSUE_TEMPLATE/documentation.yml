name: Documentation
description: Report a documentation issue or suggest a documentation improvement.
title: "[Docs]: "
labels:

* documentation
  body:

* type: markdown
  attributes:
  value: |
  Use this form for documentation issues, unclear wording, missing sections, broken links, inconsistent terminology, or example improvements.

  ```
  Do not include credentials, tokens, private keys, real client data, private logs, internal IP addresses, or sensitive vulnerability details.
  ```

* type: input
  id: document
  attributes:
  label: Document
  description: Which document needs review?
  placeholder: docs/safety-model.md
  validations:
  required: true

* type: dropdown
  id: issue_type
  attributes:
  label: Issue Type
  description: Select the type of documentation issue.
  options:
  - Missing information
  - Unclear wording
  - Incorrect information
  - Inconsistent terminology
  - Broken link
  - Formatting issue
  - Example improvement
  - Template improvement
  - Other
  validations:
  required: true

* type: textarea
  id: summary
  attributes:
  label: Summary
  description: Describe the documentation issue or improvement.
  placeholder: Explain what should be changed and why.
  validations:
  required: true

* type: textarea
  id: current_text
  attributes:
  label: Current Text
  description: Paste the current text if relevant.
  placeholder: Paste the current wording here.
  validations:
  required: false

* type: textarea
  id: suggested_text
  attributes:
  label: Suggested Text
  description: Provide suggested replacement text if available.
  placeholder: Paste the suggested wording here.
  validations:
  required: false

* type: textarea
  id: related_files
  attributes:
  label: Related Files
  description: List related files that may need updates.
  placeholder: |
  - docs/glossary.md
  - docs/safety-model.md
  - README.md
  validations:
  required: false

* type: checkboxes
  id: safety_check
  attributes:
  label: Safety Check
  description: Confirm that this issue does not include sensitive or unsafe content.
  options:
  - label: This issue does not include credentials, tokens, private keys, or secrets.
  required: true
  - label: This issue does not include real client data.
  required: true
  - label: This issue does not include private logs or internal network data.
  required: true
  - label: This issue does not include unauthorized exploitation instructions.
  required: true

* type: textarea
  id: additional_context
  attributes:
  label: Additional Context
  description: Add any other context that may help reviewers.
  placeholder: Add context here, or write "None".
  validations:
  required: false
