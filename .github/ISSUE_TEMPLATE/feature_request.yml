name: Feature Request
description: Suggest a new capability, module, workflow, schema, or documentation improvement.
title: "[Feature]:"
labels:

* enhancement
  body:

* type: markdown
  attributes:
  value: |
  Use this form to suggest a new feature or improvement for RedOps Framework.

  ```
  Keep the request aligned with authorized pentest and red team workflow management.

  Do not include credentials, tokens, private keys, real client data, private logs, internal IP addresses, exploit code, payloads, evasion details, or destructive workflow instructions.
  ```

* type: dropdown
  id: feature_area
  attributes:
  label: Feature Area
  description: Which area does this feature affect?
  options:
  - Project Workspace
  - Scope Manager
  - Asset Registry
  - ATT&CK Registry
  - Campaign Planner
  - Action Log
  - Evidence Vault
  - Finding Manager
  - Report Builder
  - Safety Gate
  - Telemetry Model
  - LLM Assistance
  - Audit Trail
  - API
  - Schema
  - Template
  - Documentation
  - Other
  validations:
  required: true

* type: textarea
  id: problem
  attributes:
  label: Problem
  description: What problem should this feature solve?
  placeholder: Describe the workflow gap, documentation gap, or product need.
  validations:
  required: true

* type: textarea
  id: proposed_solution
  attributes:
  label: Proposed Solution
  description: Describe the feature or improvement.
  placeholder: Explain what should be added or changed.
  validations:
  required: true

* type: textarea
  id: expected_workflow
  attributes:
  label: Expected Workflow
  description: Describe how the feature should work from a user perspective.
  placeholder: |
  1. User creates or opens a project.
  2. User selects the relevant module.
  3. User completes the workflow.
  4. The framework records the result.
  validations:
  required: false

* type: dropdown
  id: priority
  attributes:
  label: Priority
  description: How important is this feature?
  options:
  - Low
  - Medium
  - High
  - Critical
  validations:
  required: true

* type: dropdown
  id: version_target
  attributes:
  label: Suggested Version Target
  description: Which roadmap version should this belong to?
  options:
  - v0.1 Community Draft
  - v0.2 Framework Specification
  - v0.3 Operations Workflow
  - v0.4 Governance Model
  - v0.5 LLM Assistance
  - v0.6 Safe Validation Model
  - v0.7 Telemetry Model
  - v1.0 Stable Framework Specification
  - Not sure
  validations:
  required: false

* type: textarea
  id: safety_impact
  attributes:
  label: Safety Impact
  description: Describe any safety, authorization, scope, approval, or misuse considerations.
  placeholder: Explain whether this feature affects scope validation, approvals, audit logs, evidence handling, or LLM boundaries.
  validations:
  required: true

* type: checkboxes
  id: safety_check
  attributes:
  label: Safety Check
  description: Confirm that this request is safe to discuss publicly.
  options:
  - label: This request is for authorized security workflow management.
  required: true
  - label: This request does not include unauthorized exploitation instructions.
  required: true
  - label: This request does not include credential theft procedures.
  required: true
  - label: This request does not include malware code.
  required: true
  - label: This request does not include evasion or bypass instructions.
  required: true
  - label: This request does not include destructive workflow instructions.
  required: true
  - label: This request does not include real client data, credentials, tokens, private keys, private logs, or secrets.
  required: true

* type: textarea
  id: data_model
  attributes:
  label: Data Model Notes
  description: List any new fields, entities, status values, or schema changes needed.
  placeholder: |
  New entity:
  New fields:
  New status values:
  Related schema:
  validations:
  required: false

* type: textarea
  id: api_notes
  attributes:
  label: API Notes
  description: List any API endpoints or request/response changes if relevant.
  placeholder: |
  GET /api/v1/example
  POST /api/v1/example
  validations:
  required: false

* type: textarea
  id: llm_notes
  attributes:
  label: LLM Assistance Notes
  description: Describe whether this feature affects LLM-assisted workflow.
  placeholder: Explain supported LLM tasks, restricted tasks, validation requirements, and review requirements.
  validations:
  required: false

* type: textarea
  id: alternatives
  attributes:
  label: Alternatives
  description: Describe alternatives that were considered.
  placeholder: Add alternatives here, or write "None".
  validations:
  required: false

* type: textarea
  id: additional_context
  attributes:
  label: Additional Context
  description: Add any other context that may help reviewers.
  placeholder: Add context here, or write "None".
  validations:
  required: false
